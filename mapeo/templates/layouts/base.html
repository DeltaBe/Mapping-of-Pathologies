{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IMSS - Mapeo de Cáncer</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Ícono y estilos propios -->
  <link rel="icon" href="{% static 'img/imss_logo.png' %}">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">

</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Header sin barra blanca -->
  <header class="text-center py-2">
    <img src="{% static 'img/banner-imss.png' %}" alt="IMSS Bienestar" class="img-fluid" style="max-height: 80px;">
  </header>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #006657;">
    <div class="container">
      <a class="navbar-brand" href="{% url 'index' %}">
        <img src="{% static 'img/imss_logo.png' %}" alt="IMSS Logo" style="height: 50px;">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarIMSS">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarIMSS">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="/about/">Mapeo</a></li>
          <li class="nav-item"><a class="nav-link" href="/proyects/">Ayuda</a></li>
          <li class="nav-item"><a class="nav-link" href="/tasks/">Cargar Datos</a></li>
          <li class="nav-item"><a class="nav-link" href="/create_task/">Tablas</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'create_proyect' %}">Crear Proyecto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido -->
  <main class="container my-4 flex-grow-1">
    {% block content %}
    {% endblock %}
  </main>

  <!-- Footer pegado abajo -->
  <footer class="text-center py-3" style="background-color: #006657; color: white;">
    <p class="mb-0">© {{ now|date:"Y" }} IMSS - Sistema de Mapeo de Cáncer</p>
  </footer>

</body>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
