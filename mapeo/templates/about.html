{% extends "layouts/base.html" %}
{% load static %}

{% block content %}
<div class="contenedor-principal" style="display: flex; gap: 20px; margin: 20px;">
  <!-- Mapa centrado -->
  <div class="mapa-o-contenido" style="flex: 1;">
    <iframe 
      src="{% static mapa_file %}?v={{ cie_id }}" 
      width="100%" 
      height="600" 
      style="border: 2px solid #ccc; border-radius: 10px;">
    </iframe>
  </div>

  <!-- Panel lateral derecho -->
  <aside class="panel-derecho" style="
    width: 300px;
    background-color: #f0f4f8;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  ">
    <form method="POST" action="">
      {% csrf_token %}
      <div class="tarjeta-cie" style="display: flex; flex-direction: column; gap: 15px;">
        <h4 style="margin: 0;">Seleccionar enfermedad por clave CIE</h4>
        <p class="subtitulo" style="font-size: 0.9em; color: #555;">Búsqueda personalizada</p>
        <input 
          type="text" 
          name="cie_id" 
          class="entrada-cie" 
          placeholder="Ej. C50" 
          value="{{ cie_id }}"
          style="padding: 8px; border-radius: 6px; border: 1px solid #ccc;">

        <div class="acciones" style="display: flex; justify-content: space-between; gap: 10px;">
          <button 
            type="submit" 
            class="btn-generar" 
            title="Buscar"
            style="flex: 1; background-color: #2b7a78; color: white; border: none; border-radius: 6px; padding: 10px;">
            🔍 Buscar
          </button>
          <a 
            href="{% url 'about' %}" 
            class="btn-limpiar" 
            title="Limpiar"
            style="flex: 1; background-color: #f76c6c; color: white; text-align: center; border: none; border-radius: 6px; padding: 10px; text-decoration: none;">
            🗑️ Limpiar
          </a>
        </div>
      </div>
    </form>
  </aside>
</div>
{% endblock %}
